{% extends 'base.html' %}
{% load static %} 

{% block content %}
<section class="categories-section">
    <h2>Categories</h2>
    <div class="cards-container">
        {% for category in categories %}
        <div class="card">
            <h3>{{ category.name }}</h3>
            <img src="{% static 'images/example.jpg' %}" alt="{{ category.name }}">
            <a href="{% url 'category_detail' category.slug %}" class="btn-secondary">Explore</a>
        </div>
        {% empty %}
        <p>No categories found.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
