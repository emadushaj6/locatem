{% extends 'base.html' %}
{% load static %}
{% block title %}Contact | Locatem{% endblock %}

{% block content %}
<section class="contact">
    <div class="container">
        <h2>Contact Us</h2>
        {% if success %}
        <p class="success">Your message has been sent!</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Send Message</button>
        </form>
    </div>
</section>
{% endblock %}
